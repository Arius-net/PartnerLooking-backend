version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: partnerlooking-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-partnerlooking}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-partnerlooking}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - partnerlooking-network

networks:
  partnerlooking-network:
    driver: bridge

volumes:
  postgres_data:
